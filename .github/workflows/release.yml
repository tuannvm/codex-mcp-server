name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: 'Version bump type'
        required: true
        default: 'patch'
        type: choice
        options:
          - major
          - minor
          - patch

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write

    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@v2
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.14.0'
          registry-url: 'https://registry.npmjs.org'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Build project
        run: npm run build

      - name: Configure Git
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

      - name: Create release commit for version bump
        run: |
          # Create commit with bump type indicator for anothrNick to detect
          git commit --allow-empty -m "chore: release #${{ github.event.inputs.bump_type }}"
          git push origin main

      - name: Create version tag
        id: tag
        uses: anothrNick/github-tag-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          DEFAULT_BUMP: ${{ github.event.inputs.bump_type }}
          WITH_V: true
          RELEASE_BRANCHES: main
          VERBOSE: true

      - name: Update package.json to match tag
        if: steps.tag.outputs.new_tag != ''
        run: |
          # Extract version number from tag (remove 'v' prefix)
          NEW_VERSION=${TAG_VERSION#v}
          # Update package.json with the exact version from the tag
          npm version $NEW_VERSION --no-git-tag-version --allow-same-version
          # Commit the package.json update
          git add package.json package-lock.json
          git commit -m "chore: sync package.json with tag ${{ steps.tag.outputs.new_tag }}"
          git push origin main
        env:
          TAG_VERSION: ${{ steps.tag.outputs.new_tag }}

      - name: Generate changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          toTag: ${{ steps.tag.outputs.new_tag }}
          failOnError: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create GitHub Release
        if: steps.tag.outputs.new_tag != ''
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          release_name: Release ${{ steps.tag.outputs.new_tag }}
          body: ${{ steps.changelog.outputs.changelog }}
          draft: false
          prerelease: false

      - name: Debug OIDC token exchange
        if: steps.tag.outputs.new_tag != ''
        run: |
          echo "=== .npmrc contents ==="
          cat ~/.npmrc 2>/dev/null || echo "(no user .npmrc)"
          echo "---"
          cat .npmrc 2>/dev/null || echo "(no project .npmrc)"
          echo ""
          echo "=== OIDC exchange test ==="
          ID_TOKEN=$(curl -fsS \
            -H "Authorization: bearer $ACTIONS_ID_TOKEN_REQUEST_TOKEN" \
            "$ACTIONS_ID_TOKEN_REQUEST_URL&audience=npm:registry.npmjs.org" \
            | jq -er .value)
          PKG=$(jq -r .name package.json)
          echo "Package: $PKG"
          curl -v "https://registry.npmjs.org/-/npm/v1/oidc/token/exchange/package/$PKG" \
            -H "Authorization: Bearer $ID_TOKEN" -d "" 2>&1 || true

      - name: Publish to npm
        if: steps.tag.outputs.new_tag != ''
        run: npm publish --access public --provenance
        # Auth via OIDC Trusted Publishing — no NPM_TOKEN secret needed

      - name: Upload build artifacts
        if: steps.tag.outputs.new_tag != ''
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts-${{ steps.tag.outputs.new_tag }}
          path: |
            dist/
            package.json
            README.md
